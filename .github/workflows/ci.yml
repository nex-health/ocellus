name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./...

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install kind
        run: go install sigs.k8s.io/kind@v0.31.0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create cluster and install Cilium
        run: ./test/e2e/setup.sh up

      - name: Build
        run: make build

      - name: Run e2e tests
        run: go test -tags e2e -v -count=1 ./test/e2e/...

      - name: Teardown
        if: always()
        run: ./test/e2e/setup.sh down
