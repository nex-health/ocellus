config_version = "0"

# Go test files follow *_test.go convention.
test_patterns = ["**/*_test.go"]

# Exclude test files from duplication analysis — repetitive setup is normal.
exclude_patterns = ["**/*_test.go"]

# Suppress underscored test names (TestFoo_Bar) — deliberate style choice.
[[triage]]
match.rules = ["radarlint-go:S100"]
set.ignored = true

# runDumpMode has 6 returns — natural for setup-then-loop with error handling.
[[triage]]
match.rules = ["qlty:return-statements"]
match.file_patterns = ["main.go"]
set.ignored = true

# filteredPeers: 5-clause AND is already extracted to a named boolean.
[[triage]]
match.rules = ["qlty:boolean-logic"]
match.file_patterns = ["**/tui/peers.go"]
set.ignored = true
