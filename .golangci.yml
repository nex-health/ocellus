version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - gocritic
    - misspell
    - nilerr
    - revive
    - unconvert
    - unparam
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters: [revive]
        path: internal/format/
        text: "var-naming.*conflict"
    paths:
      - test/e2e
